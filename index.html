<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kevin Steve 772 - 启动中...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #0f0;
      font-family: 'Ubuntu Mono', monospace;
      font-size: 14px;
      line-height: 1.5;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .boot-log {
      width: 100%;
      height: 100%;
      padding: 1rem;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .log-line {
      margin-bottom: 0.3rem;
      word-break: break-all;
      white-space: pre-wrap;
    }

    /* 滚动条样式 */
    .boot-log::-webkit-scrollbar {
      width: 8px;
    }

    .boot-log::-webkit-scrollbar-track {
      background: #000;
    }

    .boot-log::-webkit-scrollbar-thumb {
      background: #0f0;
    }
  </style>
</head>
<body>
  <div class="boot-log" id="bootLog"></div>

  <script>
    const bootLog = document.getElementById('bootLog');

    const bootMessages = [
      '[    0.000000] Linux version 6.1.0-13-generic (debian-kernel@lists.debian.org) (gcc-12 (Debian 12.2.0-14) 12.2.0, GNU ld (GNU Binutils for Debian) 2.39.1)',
      '[    0.000000] Command line: BOOT_IMAGE=/boot/vmlinuz-6.1.0-13-generic root=/dev/mapper/debian--vg-root ro quiet splash',
      '[    0.025431] x86/fpu: Supporting XSAVE feature 0x001: "x87 floating point registers"',
      '[    0.112847] Last level iTLB entries: 4KB 512, 2MB 1024, 4MB 512',
      '[    0.182922] SLUB: HWalign=64, Order=0-3, MinObjects=0, CPUs=4, Nodes=1',
      '[    1.234567] systemd[1]: systemd 252.12-1 running in system mode.',
      '[    1.456789] systemd[1]: Listening on initctl.socket - systemd initctl socket.',
      '[    1.567890] systemd[1]: Listening on journal-dev-log.socket - Journal Socket (/dev/log).',
      '[    1.678901] systemd[1]: Started systemd-journald.service - Journal Service.',
      '[    1.789012] kernel: [drm] Initialized i915 1.6.0 20230427 for 0000:00:02.0 on minor 0',
      '[    1.890123] systemd-journald[123]: Received request to flush runtime journal from PID 1',
      '[    1.901234] Adding 2097148k swap on /swapfile. Priority:-2 extents:4 across:2560000k FS',
      '[    2.012345] EXT4-fs (dm-0): mounted filesystem with ordered data mode. Opts: (null)',
      '[    2.123456] audit: type=1400 audit(1234567890.456:2): apparmor="STATUS" operation="profile_load"',
      '[    2.234567] systemd[1]: Reached target local-fs.target - Local File Systems.',
      '[    2.345678] systemd[1]: Starting systemd-tmpfiles-setup.service - Create List of Required /tmp and /var/tmp Directories...',
      '[    2.456789] systemd[1]: Started systemd-tmpfiles-setup.service - Create List of Required /tmp and /var/tmp Directories.',
      '[    2.567890] systemd[1]: Reached target swap.target - Swap.',
      '[    2.678901] systemd[1]: Reached target basic.target - Basic System.',
      '[    2.789012] systemd[1]: Starting systemd-user-sessions.service - Permit User Sessions...',
      '[    2.890123] systemd[1]: Reached target multi-user.target - Multi-User System.',
      '[    2.901234] systemd[1]: Reached target graphical.target - Graphical Interface.',
      '[    3.012345] audit: type=1130 audit(1234567890.567:3): pid=1 uid=0 auid=4294967295 ses=4294967295',
      '[    3.123456] audit: type=1130 audit(1234567890.678:4): pid=1 uid=0 auid=4294967295 ses=4294967295',
      '[    3.234567] audit: type=1130 audit(1234567890.789:5): pid=1 uid=0 auid=4294967295 ses=4294967295',
      '[    3.345678] Loading Kevin Steve 772 blog system...',
      '[    3.456789] Initializing components...',
      '[    3.567890] Loading stylesheets...',
      '[    3.678901] Boot complete. Entering graphical environment.',
    ];

    function addLogLine(text) {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.textContent = text;
      bootLog.appendChild(line);
      bootLog.scrollTop = bootLog.scrollHeight;
    }

    function simulateBoot() {
      bootMessages.forEach((msg, index) => {
        setTimeout(() => {
          addLogLine(msg);
        }, index * 80);
      });

      setTimeout(() => {
        // 启动完成后自动跳转
        window.location.href = 'blog.html';
      }, bootMessages.length * 80 + 1500);
    }

    // 按任意键跳过
    document.addEventListener('keydown', () => {
      window.location.href = 'blog.html';
    });

    // 点击屏幕也跳过
    document.addEventListener('click', () => {
      window.location.href = 'blog.html';
    });

    // 启动模拟
    simulateBoot();
  </script>
</body>
</html>
